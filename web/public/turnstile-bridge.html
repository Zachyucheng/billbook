<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Billbook Turnstile</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe5;
        --surface: #fffdf8;
        --text: #143129;
        --muted: #5f726b;
        --accent: #17806d;
        --line: rgba(20, 49, 41, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(23, 128, 109, 0.14), transparent 42%),
          linear-gradient(180deg, #fbf8f1 0%, var(--bg) 100%);
        color: var(--text);
      }

      .panel {
        width: min(420px, 100%);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 28px 24px;
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(20, 49, 41, 0.08);
      }

      .kicker {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 12px 0 10px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: var(--muted);
      }

      #widget {
        margin-top: 20px;
        min-height: 70px;
      }

      .status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(23, 128, 109, 0.08);
        color: var(--text);
        font-size: 14px;
      }

      .error {
        border-color: rgba(186, 74, 47, 0.2);
        background: rgba(207, 108, 74, 0.1);
        color: #a13b1c;
      }

      button {
        margin-top: 18px;
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        background: #e8ded0;
        color: var(--text);
        font-size: 14px;
      }
    </style>
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
      async
      defer
    ></script>
  </head>
  <body>
    <main class="panel">
      <p class="kicker">Security Check</p>
      <h1>完成人机验证</h1>
      <p>验证通过后会自动返回安卓客户端，并把 token 交给当前 Cloudflare Pages 认证接口。</p>
      <div id="widget"></div>
      <div id="status" class="status">正在准备 Turnstile 验证组件…</div>
      <button type="button" id="cancel">取消并返回</button>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const siteKey = params.get("siteKey") || "";
      const statusNode = document.getElementById("status");
      const widgetNode = document.getElementById("widget");
      const cancelButton = document.getElementById("cancel");

      const bridge = window.BillbookTurnstile;

      function setStatus(message, isError = false) {
        statusNode.textContent = message;
        statusNode.classList.toggle("error", isError);
      }

      function sendError(message) {
        setStatus(message, true);
        if (bridge && typeof bridge.onError === "function") {
          bridge.onError(message);
        }
      }

      cancelButton.addEventListener("click", () => {
        if (bridge && typeof bridge.onClose === "function") {
          bridge.onClose();
        }
      });

      function mountTurnstile() {
        if (!siteKey) {
          sendError("当前验证页没有收到 Turnstile site key。");
          return;
        }

        if (!window.turnstile) {
          window.setTimeout(mountTurnstile, 200);
          return;
        }

        setStatus("请完成下方的人机验证。");

        window.turnstile.render(widgetNode, {
          sitekey: siteKey,
          theme: "light",
          callback(token) {
            setStatus("验证成功，正在返回客户端…");
            if (bridge && typeof bridge.onToken === "function") {
              bridge.onToken(token);
            }
          },
          "error-callback"() {
            sendError("Turnstile 加载失败，请稍后重试。");
          },
          "expired-callback"() {
            setStatus("验证已过期，请重新完成一次。");
            window.turnstile.reset(widgetNode);
          },
          "timeout-callback"() {
            sendError("验证超时，请重新尝试。");
          },
        });
      }

      mountTurnstile();
    </script>
  </body>
</html>
